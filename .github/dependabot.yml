# Dependabot configuration for automated dependency updates
# Generated by gh-update tool
version: 2

updates:
  # Docker dependency updates
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    rebase-strategy: disabled
    groups:
      docker-dependencies:
        patterns:
          - "*"
    labels:
      - dependencies
      - docker

  # Gomod dependency updates
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    rebase-strategy: disabled
    groups:
      gomod-dependencies:
        patterns:
          - "*"
    labels:
      - dependencies
      - golang

